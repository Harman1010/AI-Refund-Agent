<!DOCTYPE html>
<html>

<head>
    <title>AI Refund Agent</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <div class="chat-section">

            <h2>AI Customer Refund Agent</h2>

            <div id="chat-box"></div>

            <div class="input-area">

                <input type="text" id="message" placeholder="Enter your refund request">

                <button onclick="sendMessage()">
                    Send
                </button>

            </div>

        </div>

        <div class="logs-section">

            <h2>Admin Dashboard</h2>

            <div id="logs-box"></div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
